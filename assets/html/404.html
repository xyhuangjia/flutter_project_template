<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>页面未找到</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 400px;
        }

        .error-code {
            font-size: 120px;
            font-weight: 700;
            color: #1677FF;
            line-height: 1;
            margin-bottom: 16px;
            text-shadow: 2px 2px 4px rgba(22, 119, 255, 0.1);
        }

        .error-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
        }

        .error-icon svg {
            width: 100%;
            height: 100%;
        }

        .error-title {
            font-size: 20px;
            font-weight: 600;
            color: #1f1f1f;
            margin-bottom: 12px;
        }

        .error-description {
            font-size: 14px;
            color: #8c8c8c;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .btn-retry {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #1677FF;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 12px 32px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-retry:hover {
            background: #4096ff;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(22, 119, 255, 0.3);
        }

        .btn-retry:active {
            transform: translateY(0);
        }

        .btn-retry svg {
            width: 18px;
            height: 18px;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            }

            .error-code {
                color: #4096ff;
                text-shadow: 2px 2px 4px rgba(64, 150, 255, 0.2);
            }

            .error-title {
                color: #ffffff;
            }

            .error-description {
                color: #a0a0a0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <div class="error-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z" fill="#1677FF" fill-opacity="0.1"/>
                <path d="M12 8v4M12 16h.01" stroke="#1677FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <h1 class="error-title">页面未找到</h1>
        <p class="error-description">
            抱歉，您访问的页面不存在或已被移除。<br>
            请检查链接是否正确，或返回首页。
        </p>
        <button class="btn-retry" onclick="window.FlutterBridge && window.FlutterBridge.postMessage(JSON.stringify({type: 'retry'}))">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            重新加载
        </button>
    </div>
</body>
</html>
