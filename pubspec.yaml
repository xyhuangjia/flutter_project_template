name: flutter_project_template
description: A Flutter project template following Clean Architecture principles.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: "3.38.10"
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^4.0.0

  # Networking
  dio: ^5.8.0

  # Local Database
  drift: ^2.26.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path: ^1.9.0
  path_provider: ^2.1.5

  # JSON Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^3.1.0

  # Routing
  go_router: ^17.1.0

  # Dependency Injection
  get_it: ^9.2.1
  injectable: ^2.7.1

  # Utility
  intl: ^0.20.2
  uuid: ^4.5.1
  collection: ^1.19.1
  crypto: ^3.0.6

  # Logging
  talker: ^5.1.15
  talker_flutter: ^5.1.15
  talker_dio_logger: ^5.1.15
  talker_riverpod_logger: ^5.1.14

  # Connectivity
  connectivity_plus: ^7.0.0

  # Secure Storage
  flutter_secure_storage: ^10.0.0

  # Environment
  flutter_dotenv: ^6.0.0

  # Preferences
  shared_preferences: ^2.3.3

  # App Info
  package_info_plus: ^9.0.0

  # WebView
  webview_flutter: ^4.10.0

  # URL Launcher
  url_launcher: ^6.3.1

  # Share
  share_plus: ^12.0.1

  # Image Picker
  image_picker: ^1.1.2

  flutter_pickers:
    git:
      url: https://github.com/xyhuangjia/flutter_pickers.git
      ref: master  # 指定分支名称
  permission_handler: ^12.0.1
  vibration: ^3.1.8
  gpt_markdown: ^1.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.15
  riverpod_generator: ^4.0.0+1
  json_serializable: ^6.9.3
  freezed: ^3.2.3
  drift_dev: ^2.26.0
  injectable_generator: ^2.7.0

  # Utility
  flutter_launcher_icons: ^0.14.3
  change_app_package_name: ^1.4.0
  intl_utils: ^2.8.0

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
    - assets/icon/
    - assets/images/
    - assets/html/